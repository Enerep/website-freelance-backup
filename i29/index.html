



<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NOCTURNAL | Bat Swarm</title>
    
    
    
    <style>
        :root {
            --bg: #000000;
            --rock: #050507;
            --text: #ffffff;
            --bat-skin: #1a1a1c;
            --bat-eyes: #ffcc00;
            --flashlight: rgba(255, 254, 230, 0.8);
            --font: 'inter', sans-serif;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            cursor: none !important; /* hide default cursor */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        canvas {
            position: fixed; inset: 0; z-index: 1;
        }

        /* custom flashlight cursor */
        #flashlight-cursor {
            position: fixed;
            width: 300px; height: 300px;
            margin: -150px 0 0 -150px; /* center on mouse */
            background: radial-gradient(circle, var(--flashlight) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: screen; /* makes light look realistic over dark */
            will-change: transform;
        }



        /* minimalist portfolio ui */
        main {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 10vw;
            pointer-events: none; /* let light pass through text */
        }

        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 0.9;
            mix-blend-mode: difference; /* text reacts to the light */
        }

        p {
            margin-top: 20px;
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.6;
        }
    </style>
</head>







<body>

    <div id="flashlight-cursor"></div>
    <canvas id="canvas"></canvas>

    <main>
        <h1>NOCTURNAL<br>DESIGNS</h1>
        <p>Interactive Cave Systems</p>
    </main>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const lightCursor = document.getElementById('flashlight-cursor');

        let width, height;
        let mouse = { x: 0, y: 0 };
        // smooth lerp for flashlight
        let lightX = 0, lightY = 0;
        
        const flashlightRadius = 150;
        let bats = [];
        const batCount = 150; // adjust for performance

        // procedural bat drawing shapes (simplistic vectors)
        function drawBatShape(ctx, cx, cy, size, wingFold, alpha) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.fillStyle = `rgba(26, 26, 28, ${alpha})`;
            ctx.strokeStyle = `rgba(0,0,0, ${alpha * 0.5})`;
            ctx.lineWidth = 1;

            // head & body
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.4, size * 0.8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // ears
            ctx.beginPath();
            ctx.moveTo(-size*0.2, -size*0.6);
            ctx.lineTo(0, -size);
            ctx.lineTo(size*0.2, -size*0.6);
            ctx.fill();

            // wings (articulated based on wingFold variable)
            const flap = Math.sin(wingFold) * size;
            
            ctx.beginPath();
            // right wing
            ctx.moveTo(size*0.3, -size*0.2);
            ctx.bezierCurveTo(size*1.5, -size*1.5 - flap, size*2, size*0.5, size*0.3, size*0.5);
            // left wing
            ctx.moveTo(-size*0.3, -size*0.2);
            ctx.bezierCurveTo(-size*1.5, -size*1.5 - flap, -size*2, size*0.5, -size*0.3, size*0.5);
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }


        class Bat {
            constructor() {
                this.init();
                // start sleeping somewhere random
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.state = 'sleeping'; // sleeping or flying
            }

            init() {
                this.size = Math.random() * 8 + 5;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.wingSpeed = Math.random() * 0.2 + 0.1;
                this.wingFrame = Math.random() * Math.PI * 2;
                this.awakeTimer = 0;
            }

            update() {
                // calculate distance to flashlight
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < flashlightRadius && this.state === 'sleeping') {
                    // WAKE UP!
                    this.state = 'flying';
                    // chaotic scatter velocity
                    this.vx = (this.x - mouse.x) * 0.1 + (Math.random()-0.5)*10;
                    this.vy = (this.y - mouse.y) * 0.1 + (Math.random()-0.5)*10;
                }

                if (this.state === 'flying') {
                    // apply physics
                    this.x += this.vx;
                    this.y += this.vy;
                    // water/air resistance
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                    // animate wings
                    this.wingFrame += this.wingSpeed;

                    // if exposed to light, add repulsion force (run away!)
                    if (dist < flashlightRadius) {
                        let force = (flashlightRadius - dist) / flashlightRadius;
                        this.vx -= dx * force * 0.02;
                        this.vy -= dy * force * 0.02;
                    }

                    // wrap around screen edges
                    if (this.x < -100) this.x = width + 100;
                    if (this.x > width + 100) this.x = -100;
                    if (this.y < -100) this.y = height + 100;
                    if (this.y > height + 100) this.y = -100;

                    // eventually try to sleep again if slow and in darkness
                    let speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
                    if (speed < 0.5 && dist > flashlightRadius * 2) {
                        this.awakeTimer++;
                        if(this.awakeTimer > 300) { // after ~5 seconds of calm
                            this.state = 'sleeping';
                            this.awakeTimer = 0;
                        }
                    } else {
                        this.awakeTimer = 0; 
                    }
                }
            }

            draw() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                // composition modes make the interaction possible
                if (this.state === 'sleeping') {
                    // in darkness, sleeping bats are invisible EXCEPT for eyes
                    if (dist > flashlightRadius) {
                        // draw eyes only (faint amber dots)
                        ctx.fillStyle = `rgba(255, 204, 0, ${Math.random() > 0.98 ? 0.8 : 0.2})`; // blinking
                        ctx.beginPath();
                        ctx.arc(this.x - 2, this.y, 1, 0, Math.PI*2);
                        ctx.arc(this.x + 2, this.y, 1, 0, Math.PI*2);
                        ctx.fill();
                    } else {
                        // light reveals the static hanging silhouette
                        let opacity = (flashlightRadius - dist) / flashlightRadius;
                        // draw bat hanging upside down (rotated PI)
                        ctx.save();
                        ctx.translate(this.x, this.y);
                        ctx.rotate(Math.PI);
                        drawBatShape(ctx, 0, 0, this.size, Math.PI * 0.8, opacity); // folded wings
                        ctx.restore();
                    }
                } else {
                    // flying bats: use composition mode so they only appear fully where light hits
                    
                    // calculate alpha based on flashlight proximity
                    let alpha = 0.1; // faint silhouette in dark
                    if (dist < flashlightRadius) {
                        alpha = 1; // fully visible in light
                    } else if (dist < flashlightRadius * 2) {
                        // fade out in penumbra
                        alpha = 1 - (dist - flashlightRadius) / flashlightRadius;
                        alpha = Math.max(0.1, alpha);
                    }

                    // draw animated flapping bat
                    // calculate rotation based on velocity direction
                    let angle = Math.atan2(this.vy, this.vx) + Math.PI / 2;
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(angle);
                    drawBatShape(ctx, 0, 0, this.size, this.wingFrame, alpha);
                    ctx.restore();
                }
            }
        }

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            bats = [];
            for (let i = 0; i < batCount; i++) {
                bats.push(new Bat());
            }
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });



        function animate() {
            // clear background with slight trail for motion blur
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // smooth flashlight follow
            lightX += (mouse.x - lightX) * 0.1;
            lightY += (mouse.y - lightY) * 0.1;
            lightCursor.style.transform = `translate(${lightX}px, ${lightY}px)`;

            // update and draw bats
            bats.forEach(bat => {
                bat.update();
                bat.draw();
            });

            requestAnimationFrame(animate);
        }

        initCanvas();
        animate();
        window.addEventListener('resize', initCanvas);

    </script>
</body>
</html>
