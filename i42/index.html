

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Creative Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Space+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #030308;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            width: 100vw;
            cursor: grab;
        }

        body:active {
            cursor: grabbing;
        }

        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Minimalist High-End UI Overlay */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .telemetry {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: rgba(200, 220, 255, 0.4);
            text-align: right;
            line-height: 1.6;
        }

        .center-meta {
            align-self: center;
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: -3px;
            line-height: 0.9;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 30%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p.description {
            font-size: 1.1rem;
            font-weight: 300;
            color: #a0aec0;
            letter-spacing: 1px;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .cta-wrap {
            pointer-events: auto;
        }

        .btn-cosmic {
            display: inline-block;
            padding: 16px 40px;
            color: #000;
            font-weight: 600;
            text-decoration: none;
            background: #fff;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        .btn-cosmic:hover {
            transform: translateY(-4px);
            background: #00f2fe;
            box-shadow: 0 15px 40px rgba(0, 242, 254, 0.4);
        }

        footer {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="webgl-container"></div>

    <div class="ui-layer">
        <header>
            <div class="brand">CORE.05</div>
            <div class="telemetry">
                SYS.LOC // EVENT_HORIZON<br>
                GRAVITY // INTERACTIVE_MAX<br>
                FPS // 60.0_STABLE
            </div>
        </header>

        <div class="center-meta">
            <h1>Core</h1>
            <p class="description">A high-performance WebGL simulation modeling stellar matter deformation across a mathematical space-time metric. Drag to orbit. Hover to distort.</p>
            <div class="cta-wrap">
                <a href="#" class="btn-cosmic">Enter the Core</a>
            </div>
        </div>

        <footer>
            <div>HOLD LEFT CLICK TO ROTATE VIEW</div>
            <div>Bat</div>
        </footer>
    </div>

    <script type="x-shader/x-vertex" id="vertexShader">
        uniform float uTime;
        uniform vec3 uMouse3D;
        
        attribute float aRadius;
        attribute float aSpeed;
        attribute float aAngle;
        
        varying vec3 vColor;
        varying float vDistanceToCenter;

        void main() {
            // Calculate procedural orbital physics over time
            float currentAngle = aAngle + (uTime * aSpeed * 0.3);
            
            // Base circular mapping position
            vec3 vPos = vec3(cos(currentAngle) * aRadius, 0.0, sin(currentAngle) * aRadius);
            
            // PHYSICS ENGINE: Apply inverse-square gravity well funnel down the Y-axis
            // As radius gets smaller, pull position drastically downward (-Y)
            float gravityPull = pow(45.0 / (aRadius + 4.0), 1.8);
            vPos.y -= gravityPull;

            // MOUSE INTERACTION: Spatial displacement field
            float mouseDist = distance(vPos, uMouse3D);
            if (mouseDist < 35.0) {
                float factor = (1.0 - (mouseDist / 35.0));
                // Pull particles slightly toward mouse interaction coordinate
                vPos += normalize(uMouse3D - vPos) * factor * 8.0;
            }

            // COLOR GRAPHICS: Blinding white/teal center transitioning to deep nebula violet
            vec3 innerColor = vec3(0.0, 1.0, 0.95); // Blinding Quasar Teal
            vec3 outerColor = vec3(0.35, 0.02, 0.75); // Deep Space Violet
            
            // Interpolate color based on distance from the event horizon
            float colorMix = smoothstep(12.0, 95.0, aRadius);
            vColor = mix(innerColor, outerColor, colorMix);
            
            // Boost brightness of core particles to simulate thermal emission
            if(aRadius < 25.0) {
                vColor += vec3(0.3, 0.5, 0.6) * (1.0 - (aRadius / 25.0));
            }

            vec4 mvPosition = modelViewMatrix * vec4(vPos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // Size attenuation (Closer particles to camera appear larger)
            // Plus, scale up velocity tracking particles near center
            gl_PointSize = (55.0 / -mvPosition.z) * (1.0 + (8.0 / (aRadius + 1.0)));
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
        varying vec3 vColor;

        void main() {
            // Generate clean, high-performance anti-aliased soft circular points
            vec2 cxy = gl_PointCoord - vec2(0.5);
            if (dot(cxy, cxy) > 0.25) discard;
            
            float alpha = 1.0 - (length(cxy) * 2.0);
            
            // Output high-intensity additive pixel values
            gl_FragColor = vec4(vColor, alpha * 0.8);
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, particleSystem;
        let uniforms;
        
        // Raycasting for spatial interaction setup
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-1000, -1000);
        const trackingPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); // Horizontal tracking geometry
        const intersectionPoint = new THREE.Vector3(-1000, -1000, 0);

        init();
        animate();

        function init() {
            const container = document.getElementById('webgl-container');

            scene = new THREE.Scene();
            // Deep cosmic background atmospheric fog matching background color
            scene.fog = new THREE.FogExp2(0x030308, 0.006);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            // Dynamic premium camera starting angle looking slightly down into the well
            camera.position.set(0, 45, 110);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // 1. GENERATE THE CENTRAL BLACK HOLE (The Event Horizon)
            const horizonGeo = new THREE.SphereGeometry(10, 32, 32);
            const horizonMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const eventHorizon = new THREE.Mesh(horizonGeo, horizonMat);
            scene.add(eventHorizon);

            // 2. CONFIGURING THE ACCRETION DISK FIELD
            const particleCount = 70000;
            const positions = new Float32Array(particleCount * 3);
            const radii = new Float32Array(particleCount);
            const speeds = new Float32Array(particleCount);
            const angles = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                // Generate exponential clustering distribution toward center core
                // Math.random() raised to higher power groups values near zero
                let baseDist = Math.pow(Math.random(), 2.5);
                let radius = 11.0 + (baseDist * 110.0); // Bound between edge of event horizon and outer edge
                
                radii[i] = radius;
                angles[i] = Math.random() * Math.PI * 2.0;
                
                // Kepler's Third Law Approximation: Closer objects orbit exponentially faster
                speeds[i] = (1.0 / Math.sqrt(radius)) * 25.0;

                // Temporary zero arrays for standard buffer position slots
                positions[i * 3] = 0;
                positions[i * 3 + 1] = 0;
                positions[i * 3 + 2] = 0;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aRadius', new THREE.BufferAttribute(radii, 1));
            geometry.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
            geometry.setAttribute('aAngle', new THREE.BufferAttribute(angles, 1));

            uniforms = {
                uTime: { value: 0 },
                uMouse3D: { value: new THREE.Vector3(-1000, -1000, 0) }
            };

            const material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending // Blends overlapping particle light values for extreme brightness
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            // 3. CINEMATIC CAMERA SYSTEM INTERFACING
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.04;
            controls.minDistance = 30;
            controls.maxDistance = 200;
            // Prevent camera from clipping perfectly vertically inside the core geometry
            controls.maxPolarAngle = Math.PI * 0.85; 

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
        }

        function onMouseMove(event) {
            // Map standard mouse screen coordinates to 3D projected vectors
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(trackingPlane, intersectionPoint);
            
            // Pass computed 3D vector directly down to WebGL graphics uniform mapping
            uniforms.uMouse3D.value.copy(intersectionPoint);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Advance system uniform time loop
            uniforms.uTime.value += 0.05;
            
            // Smoothly drift base particle node platform system rotation for constant micro-kinetic feedback
            particleSystem.rotation.y += 0.0005;

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
