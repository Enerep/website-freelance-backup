<!DOCTYPE html><html style="margin:0;background:#000;overflow:hidden;cursor:crosshair"><canvas id="c"></canvas><script>c.width=w=innerWidth;c.height=h=innerHeight;x=c.getContext('2d');m={x:w/2,y:h/2,d:1};onmousemove=e=>{m.x=e.clientX;m.y=e.clientY};onmousedown=()=>m.d=-1;onmouseup=()=>m.d=1;p=Array.from({length:3e3},()=>({x:Math.random()*w,y:Math.random()*h,u:0,v:0}));t=0;(L=()=>{t+=.01;x.fillStyle='rgba(0,0,0,.08)';x.fillRect(0,0,w,h);x.globalCompositeOperation='lighter';p.map((i,j)=>{X=m.x-i.x;Y=m.y-i.y;D=Math.hypot(X,Y)+1;A=Math.atan2(Y,X);F=m.d*1500/D;i.u+=Math.cos(A)*F*.01+Math.cos(A+1.57+Math.sin(t+j)*.5)*1.2;i.v+=Math.sin(A)*F*.01+Math.sin(A+1.57+Math.sin(t+j)*.5)*1.2;i.u*=.94;i.v*=.94;x.beginPath();x.moveTo(i.x,i.y);i.x+=i.u;i.y+=i.v;x.lineTo(i.x,i.y);x.strokeStyle=`hsl(${D*1.5+t*200},100%,${m.d<0?80:60}%)`;x.stroke()});x.globalCompositeOperation='source-over';requestAnimationFrame(L)})();</script></html>
