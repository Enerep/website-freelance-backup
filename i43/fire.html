

<!DOCTYPE html>

<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGNITION | 3D WebGL</title>
    <style>
        /* Modern CSS Reset & Typography */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Sleek UI Overlay */
        .ui-layer {
            position: absolute;
            z-index: 2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none; /* Lets mouse interact with canvas behind it */
        }

        h1 {
            color: #ffffff;
            font-size: 6rem;
            font-weight: 200;
            letter-spacing: 1rem;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0px 0px 30px rgba(255, 68, 0, 0.8);
            user-select: none;
        }

        p {
            color: #ffaa00;
            font-size: 1rem;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            margin-top: 10px;
            opacity: 0.7;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <h1>Ignition</h1>
        <p>Interactive 3D Experience</p>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030000, 0.015); // Adds depth to the darkness

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;
        camera.position.y = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimize for high-DPI screens
        container.appendChild(renderer.domElement);

        // 2. Fire Particle System Logic
        const particleCount = 3500;
        const geometry = new THREE.BufferGeometry();
        
        // Attributes for the custom shader
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        // Custom data arrays for animation logic
        const velocities = [];
        const lifetimes = [];

        // Fire Color Gradient
        const colorBase = new THREE.Color(0xffea88); // White-hot core
        const colorMid = new THREE.Color(0xff4400);  // Fierce orange/red
        const colorEnd = new THREE.Color(0x1a0000);  // Dark smoke

        // Initialize particles
        for (let i = 0; i < particleCount; i++) {
            resetParticle(i, true);
        }

        function resetParticle(i, isInitial = false) {
            // Spawn in a tight circular base
            const radius = Math.random() * 3;
            const theta = Math.random() * Math.PI * 2;
            
            positions[i * 3] = radius * Math.cos(theta); // x
            positions[i * 3 + 1] = isInitial ? (Math.random() * 25 - 5) : -5; // y (start lower if resetting)
            positions[i * 3 + 2] = radius * Math.sin(theta); // z
            
            // Movement physics
            velocities[i] = {
                x: (Math.random() - 0.5) * 0.08,
                y: Math.random() * 0.15 + 0.1, // Upward draft
                z: (Math.random() - 0.5) * 0.08
            };
            
            // Age and dying rate
            lifetimes[i] = {
                life: isInitial ? Math.random() : 1.0,
                decay: Math.random() * 0.008 + 0.004
            };
            
            sizes[i] = Math.random() * 45 + 15;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // 3. Custom GLSL Shader for procedural glowing orbs
        const material = new THREE.ShaderMaterial({
            vertexShader: `
                attribute float size;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    // Scale particles based on distance from camera
                    gl_PointSize = size * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    // Create a circular particle
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    float ll = length(xy);
                    if (ll > 0.5) discard;
                    
                    // Create a soft, glowing radial gradient
                    float alpha = pow((0.5 - ll) * 2.0, 1.5);
                    gl_FragColor = vec4(vColor, alpha * 0.85);
                }
            `,
            blending: THREE.AdditiveBlending, // Makes overlapping fire brighter
            depthWrite: false, // Prevents weird black square artifacts
            transparent: true,
            vertexColors: true
        });

        const fireSystem = new THREE.Points(geometry, material);
        scene.add(fireSystem);

        // 4. Interactivity (Mouse Parallax)
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            // Normalize mouse coordinates
            mouseX = (event.clientX - window.innerWidth / 2) * 0.05;
            mouseY = (event.clientY - window.innerHeight / 2) * 0.05;
        });

        // 5. Animation Loop
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;

        function animate() {
            requestAnimationFrame(animate);

            // Smooth camera parallax
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (15 - mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            for (let i = 0; i < particleCount; i++) {
                lifetimes[i].life -= lifetimes[i].decay;
                
                // Respawn dead particles at the bottom
                if (lifetimes[i].life <= 0) {
                    resetParticle(i);
                }
                
                const idx = i * 3;
                
                // Apply Velocity
                posAttr.array[idx] += velocities[i].x;
                posAttr.array[idx + 1] += velocities[i].y;
                posAttr.array[idx + 2] += velocities[i].z;
                
                // Add a swirling wind effect as the fire rises
                const heightPhase = posAttr.array[idx + 1] * 0.15;
                posAttr.array[idx] += Math.sin(heightPhase) * 0.03;
                posAttr.array[idx + 2] += Math.cos(heightPhase) * 0.03;

                // Color interpolation based on remaining lifespan
                let currentLife = lifetimes[i].life;
                let c = new THREE.Color();
                if (currentLife > 0.5) {
                    // Hot core -> Mid orange
                    c.lerpColors(colorMid, colorBase, (currentLife - 0.5) / 0.5);
                } else {
                    // Mid orange -> Dark smoke fade
                    c.lerpColors(colorEnd, colorMid, currentLife / 0.5);
                }
                
                colAttr.array[idx] = c.r;
                colAttr.array[idx + 1] = c.g;
                colAttr.array[idx + 2] = c.b;
            }
            
            // Tell WebGL the data has changed and needs re-rendering
            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            
            renderer.render(scene, camera);
        }

        // Handle browser resizing gracefully
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Ignite!
        animate();
    </script>
</body>
</html>
