



<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Requiem</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syncopate:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #020205;
            color: #fff;
            font-family: 'Space Mono', monospace;
            height: 100vh;
            width: 100vw;
        }

        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        .quantum-card {
            padding: 3rem 5rem;
            text-align: center;
            pointer-events: auto;
            position: relative;
        }

        /* Glitch Title Effect */
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 10px;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.5);
            margin-bottom: 1rem;
        }

        h1::before, h1::after {
            content: "SUPERPOSITION";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        h1::before {
            color: #0ff;
            z-index: -1;
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
        }

        h1::after {
            color: #f0f;
            z-index: -2;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        p.subtitle {
            font-size: 1rem;
            letter-spacing: 5px;
            color: #00ffcc;
            margin-bottom: 2rem;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .status-box {
            font-size: 0.8rem;
            color: #ff0055;
            border: 1px solid #ff0055;
            padding: 10px 20px;
            display: inline-block;
            margin-bottom: 2rem;
            background: rgba(255, 0, 85, 0.1);
            animation: pulse 2s infinite;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            color: #00ffcc;
            text-decoration: none;
            border: 1px solid #00ffcc;
            background: transparent;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
            text-shadow: 0 0 8px #fff;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
            100% { clip-path: inset(30% 0 50% 0); transform: translate(1px, -1px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
            20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, 1px); }
            60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, -1px); }
            80% { clip-path: inset(50% 0 30% 0); transform: translate(1px, 2px); }
            100% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, -2px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="webgl-container"></div>

    <div class="ui-layer">
        <div class="quantum-card">
            <div class="status-box">SYSTEM STATE: UNCERTAIN</div>
            <h1>SUPERPOSITION</h1>
            <p class="subtitle">Observe to Collapse the Wavefunction</p>
            <a href="#" class="btn">Initiate Sequence</a>
        </div>
    </div>

    <script type="x-shader/x-vertex" id="vertexShader">
        uniform float uTime;
        uniform vec3 uMouse3D;
        uniform float uRadius;

        attribute vec3 targetPosition;
        
        varying float vCollapse;
        varying vec3 vColor;

        // Generic 3D noise function
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
        
        float snoise(vec3 v) {
            const vec2 C = vec2(1.0/6.0, 1.0/3.0) ;
            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i  = floor(v + dot(v, C.yyy) );
            vec3 x0 = v - i + dot(i, C.xxx) ;
            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min( g.xyz, l.zxy );
            vec3 i2 = max( g.xyz, l.zxy );
            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + C.yyy;
            vec3 x3 = x0 - D.yyy;
            i = mod289(i);
            vec4 p = permute( permute( permute(
                        i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                      + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                      + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
            float n_ = 0.142857142857;
            vec3  ns = n_ * D.wyz - D.xzx;
            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_ );
            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4( x.xy, y.xy );
            vec4 b1 = vec4( x.zw, y.zw );
            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
            vec3 p0 = vec3(a0.xy,h.x);
            vec3 p1 = vec3(a0.zw,h.y);
            vec3 p2 = vec3(a1.xy,h.z);
            vec3 p3 = vec3(a1.zw,h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            
            // THE FIX: Define 'm' before using it
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            
            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
        }

        void main() {
            float dist = distance(targetPosition, uMouse3D);
            float collapse = 1.0 - smoothstep(0.0, uRadius, dist);
            vCollapse = collapse;

            vec3 noisePos = vec3(
                snoise(vec3(uTime * 0.5, position.x * 0.02, position.y * 0.02)) * 30.0,
                snoise(vec3(uTime * 0.4, position.y * 0.02, position.z * 0.02)) * 30.0,
                snoise(vec3(uTime * 0.6, position.z * 0.02, position.x * 0.02)) * 30.0
            );

            vec3 finalPos = mix(position + noisePos, targetPosition, collapse);

            vec3 chaosColor = vec3(0.1, 0.0, 0.3);
            vec3 structureColor = vec3(0.0, 1.0, 0.8);
            vColor = mix(chaosColor, structureColor, collapse);

            vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            gl_PointSize = mix(1.0, 3.0, collapse) * (100.0 / -mvPosition.z);
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
        varying float vCollapse;
        varying vec3 vColor;

        void main() {
            vec2 xy = gl_PointCoord.xy - vec2(0.5);
            float ll = length(xy);
            if(ll > 0.5) discard;
            
            float glow = 1.0 - (ll * 2.0);
            
            vec3 finalColor = vColor;
            if(vCollapse > 0.5) {
                finalColor += vec3(0.2, 0.0, 0.1) * vCollapse;
            }

            gl_FragColor = vec4(finalColor, glow * mix(0.3, 1.0, vCollapse));
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, particles;
        let uniforms;
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(-1000, -1000);
        const invisiblePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const target3D = new THREE.Vector3(-1000, -1000, 0);

        init();
        animate();

        function init() {
            const container = document.getElementById('webgl-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020205, 0.015);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const targetGeometry = new THREE.TorusKnotGeometry(25, 6, 200, 30);
            const targetPositions = targetGeometry.attributes.position.array;

            const particleCount = targetPositions.length / 3;
            const positions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 200;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('targetPosition', new THREE.BufferAttribute(targetPositions, 3));

            uniforms = {
                uTime: { value: 0 },
                uMouse3D: { value: new THREE.Vector3(0, 0, 0) },
                uRadius: { value: 35.0 }
            };

            const material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('touchmove', onTouchMove, { passive: false });
        }

        function getMouse3D(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(invisiblePlane, target3D);
            return target3D;
        }

        function onMouseMove(event) {
            uniforms.uMouse3D.value.copy(getMouse3D(event.clientX, event.clientY));
        }

        function onTouchMove(event) {
            if (event.touches.length > 0) {
                uniforms.uMouse3D.value.copy(getMouse3D(event.touches[0].clientX, event.touches[0].clientY));
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            uniforms.uTime.value += 0.01;
            
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
