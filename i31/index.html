

<!DOCTYPE html>
<html lang="en">




<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>© Proprietary Nexus | No Rights Reserved</title>
    <style>
        :root {
            --bg: #ffffff;
            --text-main: #000000;
            --legal-red: #ff0000;
            --font-legal: 'Courier New', Courier, monospace;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            cursor: none !important; /* hide default cursor absolutely */
            user-select: none; /* prevent text selection to enhance the copyright feel */
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-legal);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #canvas {
            position: fixed; inset: 0;
            z-index: 1;
        }

        /* aggressive custom cursor */
        #cursor-main {
            position: fixed; top: 0; left: 0;
            width: 60px; height: 60px;
            margin: -30px 0 0 -30px;
            z-index: 10000;
            pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }

        /* the legal stamp ring */
        #cursor-stamp {
            position: absolute;
            font-size: 8px; font-weight: bold; color: var(--legal-red);
            text-transform: uppercase; letter-spacing: 2px;
            width: 100%; height: 100%;
            animation: rotateCursor 4s linear infinite;
        }

        /* crosshair center */
        #cursor-reticle {
            position: absolute; width: 10px; height: 10px;
            border: 1px solid var(--legal-red); border-radius: 50%;
        }
        #cursor-reticle::before { content: ''; position: absolute; top: 50%; width: 100%; height: 1px; background: var(--legal-red); }
        #cursor-reticle::after { content: ''; position: absolute; left: 50%; width: 1px; height: 100%; background: var(--legal-red); }

        @keyframes rotateCursor { to { transform: rotate(360deg); } }

        /* content layer */
        main {
            position: relative; z-index: 10;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            mix-blend-mode: exclusion; /* enhances glitch feel against elements */
        }

        h1 {
            font-size: clamp(3rem, 10vw, 8rem); font-weight: 900;
            line-height: 0.9; text-transform: uppercase; letter-spacing: -2px;
            position: relative;
        }

        /* aggressive glitch animation on main title */
        h1::before, h1::after {
            content: "INTELLECTUAL PROPERTY"; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: white;
        }
        h1::before {
            color: lime; z-index: -1; animation: glitch1 1.5s infinite linear alternate-reverse;
        }
        h1::after {
            color: var(--legal-red); z-index: -2; animation: glitch2 2s infinite linear alternate-reverse;
        }

        @keyframes glitch1 {
            0% { clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%); transform: translate(5px); }
            50% { clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%); transform: translate(-5px); }
            100% { clip-path: polygon(0 33%, 100% 33%, 100% 67%, 0 67%); transform: translate(0); }
        }
        @keyframes glitch2 {
            0% { clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%); transform: translate(-5px, 5px); }
            50% { clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%); transform: translate(5px, -5px); }
            100% { clip-path: polygon(0 33%, 100% 33%, 100% 67%, 0 67%); transform: translate(0); }
        }

        p.subline {
            margin-top: 30px; font-size: 1rem; font-weight: bold;
            letter-spacing: 0.3em; text-transform: uppercase; color: var(--legal-red);
            animation: flicker 0.2s infinite alternate;
        }
        @keyframes flicker { to { opacity: 0.4; } }

        /* simulated interactive links */
        .link-list {
            margin-top: 60px; list-style: none;
            display: flex; gap: 30px; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .link-list li { position: relative; padding: 5px; }

        /* redaction overlay on hover */
        .link-list li:hover::after {
            content: 'REDACTED'; position: absolute; inset: -2px -10px;
            background: black; color: white; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 10px;
        }

        /* decorative corner warning */
        .corner-notice {
            position: fixed; bottom: 20px; right: 20px;
            font-size: 10px; color: var(--legal-red); text-transform: uppercase;
            text-align: right; letter-spacing: 1px; line-height: 1.4;
            z-index: 100;
        }
    </style>
</head>


<body>

    <canvas id="canvas"></canvas>

    <div id="cursor-main">
        <svg id="cursor-stamp" viewBox="0 0 100 100">
            <path id="curve" d="M 50, 50 m -35, 0 a 35,35 0 1,1 70,0 a 35,35 0 1,1 -70,0" fill="none"/>
            <text fill="var(--legal-red)">
                <textPath href="#curve">WARNING: PROPRIETARY CONTENT - NO UNAUTHORIZED USE - </textPath>
            </text>
        </svg>
        <div id="cursor-reticle"></div>
    </div>

    <main>
        <h1>INTELLECTUAL<br>PROPERTY</h1>
        <p class="subline">[ALL RIGHTS RESERVED]</p>
        
        <ul class="link-list">
            <li>licensing_agreement.pdf</li>
            <li>digital_rights_management</li>
            <li>infringement_penalties</li>
        </ul>
    </main>

    <div class="corner-notice">
        unauthorized viewing punishable<br>by digital termination protocol<br>© © © © ©
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor-main');
        const links = document.querySelectorAll('.link-list li');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let isHovering = false;

        //this handles canvas resizing
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouseX = width / 2;
            mouseY = height / 2;
        }

        window.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            //move the stamp cursor
            cursor.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
        });

        //detection of hovering over restricted text
        links.forEach(l => {
            l.addEventListener('mouseenter', () => isHovering = true);
            l.addEventListener('mouseleave', () => isHovering = false);
        });

        //--- the aggressive background grid system ---
        const backgroundWatermarks = [];
        const stampTexts = ['©', 'CONFIDENTIAL', 'REDACTED', 'DO NOT DUPLICATE'];
        
        for(let i=0; i<100; i++){
            backgroundWatermarks.push({
                x: Math.random() * width,
                y: Math.random() * height,
                text: stampTexts[Math.floor(Math.random() * stampTexts.length)],
                baseRot: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.2 + 0.1,
                alpha: Math.random() * 0.1 // very light over white bg
            });
        }

        //--- dynamic 'c' symbols particle system ---
        let cSymbols = [];
        function createCSymbols(x, y) {
            for(let i=0; i<20; i++){
                cSymbols.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    size: Math.random() * 20 + 10,
                    life: 50 + Math.random() * 20
                });
            }
        }

        function animate() {
            //clear with sterile white
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);

            //1. update and draw overwhelming proprietary background
            backgroundWatermarks.forEach(w => {
                //this makes them move slightly on mouse move
                let mxDiff = (mouseX - width/2) * (w.alpha * 0.5);
                let myDiff = (mouseY - height/2) * (w.alpha * 0.5);
                
                ctx.save();
                ctx.translate(w.x + mxDiff, w.y + myDiff);
                //this rotates them constantly
                ctx.rotate(w.baseRot + Date.now() * 0.0001 * w.speed);
                ctx.fillStyle = `rgba(0,0,0, ${w.alpha})`;
                //increase density if hovering restricted areas
                if(isHovering && Math.random() > 0.9) ctx.fillStyle = `rgba(255,0,0, 0.05)`;
                
                ctx.font = `bold ${w.text === '©' ? 20 : 10}px 'Courier New'`;
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'center';
                ctx.fillText(w.text, 0, 0);
                ctx.restore();
            });

            //2. draw decorative 'copier scanline' effect
            ctx.fillStyle = 'rgba(0,0,0, 0.02)';
            if(Math.random() > 0.98){
                //glitchy scanline horizontal
                ctx.fillRect(0, Math.random() * height, width, Math.random() * 10);
            }
            if(Math.random() > 0.99){
                //glitchy vertical bar
                ctx.fillRect(Math.random() * width, 0, Math.random() * 5, height);
            }

            //3. handle hovering crazy 'c' spawn animation
            if(isHovering && Math.random() > 0.5){
                createCSymbols(mouseX, mouseY);
            }

            //4. update and draw floating copyright particles
            cSymbols.forEach((c, i) => {
                c.x += c.vx; c.y += c.vy;
                c.vy += 0.3; // subtle gravity
                c.vx *= 0.95; // damping
                c.life--;

                if(c.life <= 0) cSymbols.splice(i, 1);

                ctx.font = `${c.size}px bold Courier New`;
                //this flickers between black and red
                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.5)' : 'rgba(255,0,0,0.8)';
                ctx.fillText('©', c.x, c.y);
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
        window.addEventListener('resize', init);
    </script>
</body>


</html>
