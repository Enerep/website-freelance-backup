<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Portfolio Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400&display=swap');

        :root {
            /* Solar System Variables for easy tweaking */
            --sun-size: 180px;
            --orbit-1: 300px;
            --orbit-2: 450px;
            --orbit-3: 650px;
            --orbit-4: 850px;
            --orbit-5: 1050px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #050011;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        /* High-performance Canvas Background */
        #spaceCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Nebula Overlays */
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
            animation: nebulaPulse 20s ease-in-out infinite alternate;
        }
        .nebula-purple { top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, #4a00e0 0%, transparent 70%); }
        .nebula-blue { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, #00c6ff 0%, transparent 70%); }

        /* Container for mouse parallax (safely wraps planets without breaking orbits) */
        #solar-system {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            z-index: 5;
            transition: transform 0.1s ease-out;
        }

        /* The Sun */
        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            width: var(--sun-size);
            height: var(--sun-size);
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, #fff 0%, #ffdf00 30%, #ff8c00 80%, #ff0000 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 60px #ff9500, 
                0 0 120px #ff4500, 
                0 0 200px rgba(255, 69, 0, 0.6),
                inset 0 0 40px rgba(255, 255, 255, 0.8);
            animation: sunPulse 4s ease-in-out infinite alternate;
        }

        /* Orbit Rings */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Base Planet Styles */
        .planet {
            position: absolute;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            /* 3D Sphere effect using inset shadows */
            box-shadow: inset -15px -15px 25px rgba(0,0,0,0.7), 0 0 20px rgba(255,255,255,0.2);
        }

        /* Planet 1: Earth-like */
        .planet1 {
            width: 40px; height: 40px;
            margin-top: -20px; margin-left: -20px;
            background: radial-gradient(circle at 30% 30%, #4facfe 0%, #00f2fe 100%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.6), 0 0 20px rgba(79, 172, 254, 0.6);
            animation: orbit 10s linear infinite;
        }

        /* Planet 2: Mars-like */
        .planet2 {
            width: 30px; height: 30px;
            margin-top: -15px; margin-left: -15px;
            background: radial-gradient(circle at 30% 30%, #fa709a 0%, #fee140 100%);
            box-shadow: inset -8px -8px 16px rgba(0,0,0,0.6), 0 0 15px rgba(250, 112, 154, 0.6);
            animation: orbit 16s linear infinite;
        }

        /* Planet 3: Jupiter-like */
        .planet3 {
            width: 80px; height: 80px;
            margin-top: -40px; margin-left: -40px;
            background: repeating-linear-gradient(0deg, #d48e46, #d48e46 10px, #e8c08e 10px, #e8c08e 20px);
            animation: orbit 24s linear infinite;
        }

        /* Planet 4: Saturn-like */
        .planet4 {
            width: 60px; height: 60px;
            margin-top: -30px; margin-left: -30px;
            background: radial-gradient(circle at 30% 30%, #f6d365 0%, #fda085 100%);
            animation: orbit 34s linear infinite;
        }
        
        /* Saturn's Ring */
        .planet4::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 130px; height: 30px;
            transform: translate(-50%, -50%) rotate(25deg);
            border: 8px solid rgba(246, 211, 101, 0.5);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(246, 211, 101, 0.3);
            pointer-events: none;
        }

        /* Planet 5: Alien Neon */
        .planet5 {
            width: 45px; height: 45px;
            margin-top: -22.5px; margin-left: -22.5px;
            background: radial-gradient(circle at 30% 30%, #b224ef 0%, #7579ff 100%);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.7), 0 0 30px rgba(178, 36, 239, 0.8);
            animation: orbit 45s linear infinite;
        }

        /* UI Content */
        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
            width: 100%;
        }

        .content h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5vw;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(to right, #fff, #00f2fe, #b224ef, #fff);
            background-size: 300% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textShine 5s linear infinite;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            margin-bottom: 10px;
        }

        .content p {
            font-size: 1.5rem;
            color: #a3c2ff;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            animation: float 4s ease-in-out infinite;
        }

        /* Keyframes */
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(var(--radius)) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(var(--radius)) rotate(-360deg); }
        }

        @keyframes sunPulse {
            0%   { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
            100% { transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.2); }
        }

        @keyframes textShine {
            to { background-position: 300% center; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes nebulaPulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <!-- Dynamic HTML5 Canvas Background -->
    <canvas id="spaceCanvas"></canvas>
    
    <!-- Atmospheric Glowing Nebulas -->
    <div class="nebula nebula-purple"></div>
    <div class="nebula nebula-blue"></div>

    <!-- Solar System Container (allows parallax without breaking orbits) -->
    <div id="solar-system">
        <div class="sun"></div>
        
        <!-- Orbits and Planets -->
        <div class="orbit" style="width: var(--orbit-1); height: var(--orbit-1);"></div>
        <div class="planet planet1" style="--radius: calc(var(--orbit-1) / 2);"></div>
        
        <div class="orbit" style="width: var(--orbit-2); height: var(--orbit-2);"></div>
        <div class="planet planet2" style="--radius: calc(var(--orbit-2) / 2);"></div>
        
        <div class="orbit" style="width: var(--orbit-3); height: var(--orbit-3);"></div>
        <div class="planet planet3" style="--radius: calc(var(--orbit-3) / 2);"></div>
        
        <div class="orbit" style="width: var(--orbit-4); height: var(--orbit-4);"></div>
        <div class="planet planet4" style="--radius: calc(var(--orbit-4) / 2);"></div>
        
        <div class="orbit" style="width: var(--orbit-5); height: var(--orbit-5);"></div>
        <div class="planet planet5" style="--radius: calc(var(--orbit-5) / 2);"></div>
    </div>
    
    <!-- Text Overlay -->
    <div class="content">
        <h1>COSMIC CREATOR</h1>
        <p>Exploring the Universe of Possibilities</p>
    </div>

    <script>
        // --- High Performance Canvas Starfield ---
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let stars = [];
        let comets = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Create Star objects
        for(let i = 0; i < 800; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 1.5,
                opacity: Math.random(),
                speed: Math.random() * 0.05,
                twinkleSpeed: Math.random() * 0.02
            });
        }

        // Animation Loop for Canvas
        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw & Update Stars
            stars.forEach(star => {
                // Twinkle effect
                star.opacity += star.twinkleSpeed;
                if(star.opacity > 1 || star.opacity < 0.1) star.twinkleSpeed *= -1;
                
                // Slow drift
                star.x -= star.speed;
                if(star.x < 0) star.x = width;

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
            });

            // Randomly generate comets (Shooting Stars)
            if(Math.random() < 0.01) {
                comets.push({
                    x: Math.random() * width,
                    y: 0,
                    length: Math.random() * 80 + 20,
                    speed: Math.random() * 5 + 5,
                    opacity: 1
                });
            }

            // Draw & Update Comets
            comets.forEach((comet, index) => {
                comet.x -= comet.speed;
                comet.y += comet.speed;
                comet.opacity -= 0.01;

                ctx.beginPath();
                ctx.moveTo(comet.x, comet.y);
                ctx.lineTo(comet.x + comet.length, comet.y - comet.length);
                ctx.strokeStyle = `rgba(255, 255, 255, ${comet.opacity})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                if(comet.opacity <= 0) comets.splice(index, 1);
            });

            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // --- Smooth Mouse Parallax Effect ---
        const solarSystem = document.getElementById('solar-system');
        
        document.addEventListener('mousemove', (e) => {
            // Calculate mouse position relative to center (-1 to 1)
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            
            // Apply slight rotation and translation to the whole solar system container
            // This prevents the CSS animation transforms on the planets from being overridden!
            solarSystem.style.transform = `translate(calc(-50% + ${x * 40}px), calc(-50% + ${y * 40}px)) rotateX(${-y * 10}deg) rotateY(${x * 10}deg)`;
        });
        
    </script>
</body>
</html>
